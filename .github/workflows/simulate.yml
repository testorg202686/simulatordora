name: Simulate DORA Deployments

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"  # every 15 min

# ✅ REQUIRED PERMISSIONS
permissions:
  contents: read
  deployments: write

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Create Deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ENVIRONMENTS=("dev" "staging" "prod")
          ENV=${ENVIRONMENTS[$RANDOM % ${#ENVIRONMENTS[@]}]}

          echo "Creating deployment for environment: $ENV"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments \
            -d "{
              \"ref\": \"main\",
              \"environment\": \"$ENV\",
              \"auto_merge\": false,
              \"required_contexts\": []
            }")

          DEPLOYMENT_ID=$(echo $RESPONSE | jq -r '.id')

          echo "Deployment ID: $DEPLOYMENT_ID"

          STATES=("success" "failure")
          STATE=${STATES[$RANDOM % ${#STATES[@]}]}

          echo "Setting deployment status: $STATE"

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses \
            -d "{
              \"state\": \"$STATE\"
            }"
